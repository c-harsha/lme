name: refresh

on:
  schedule:
    # 18:00 UTC daily — LME official prices for the day are settled by ~17:00 London time.
    - cron: "0 18 * * *"
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: refresh
  cancel-in-progress: true

env:
  # Run JS actions on Node 24 ahead of the June 2026 default switch.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - run: python fetcher.py
        env:
          HC_PING_URL: ${{ secrets.HC_PING_URL }}

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "data: refresh $(date -u +%Y-%m-%d)"
            git push
          fi
