name: refresh

on:
  schedule:
    # 20:00 UTC daily — ~3 hours after LME close (official prices settle by
    # ~17:00 London). Cron is UTC-only, so this is exactly 3h after close in
    # winter (GMT) and 4h after in summer (BST); always >=3h post-close.
    - cron: "0 20 * * *"
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - run: python fetcher.py
        env:
          HC_PING_URL: ${{ secrets.HC_PING_URL }}

      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "data: refresh $(date -u +%Y-%m-%d)"
            git push
          fi
